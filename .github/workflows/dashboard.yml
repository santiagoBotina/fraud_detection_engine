name: Dashboard CI

on:
  push:
    paths:
      - "dashboard/**"
      - ".github/workflows/dashboard.yml"
  pull_request:
    paths:
      - "dashboard/**"
      - ".github/workflows/dashboard.yml"

defaults:
  run:
    working-directory: dashboard

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check and build
        run: npm run build
