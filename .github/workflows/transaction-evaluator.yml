name: Transaction Evaluator CI

on:
  push:
    paths:
      - "ms-transaction-evaluator/**"
      - ".github/workflows/transaction-evaluator.yml"
  pull_request:
    paths:
      - "ms-transaction-evaluator/**"
      - ".github/workflows/transaction-evaluator.yml"

defaults:
  run:
    working-directory: ms-transaction-evaluator

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: ms-transaction-evaluator/go.sum

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      - name: Run golangci-lint
        run: golangci-lint run ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: ms-transaction-evaluator/go.sum

      - name: Run tests
        run: go test -race -count=1 ./...
