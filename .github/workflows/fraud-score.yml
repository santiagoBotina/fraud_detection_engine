name: Fraud Score Service CI

on:
  push:
    paths:
      - "ms-fraud-score/**"
      - ".github/workflows/fraud-score.yml"
  pull_request:
    paths:
      - "ms-fraud-score/**"
      - ".github/workflows/fraud-score.yml"

defaults:
  run:
    working-directory: ms-fraud-score

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: ms-fraud-score/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -v

  lint:
    name: Lint
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: ms-fraud-score/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt ruff

      - name: Run ruff
        run: ruff check app/
