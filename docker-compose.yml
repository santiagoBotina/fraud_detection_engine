services:
  dynamodb:
    container_name: ${DYNAMO_CONTAINER_NAME}
    image: amazon/dynamodb-local
    ports:
      - "${DYNAMO_DB_PORT}:${DYNAMO_DB_PORT}"
    command: -jar DynamoDBLocal.jar -inMemory -sharedDb
    networks:
      - local-network

  zookeeper:
    container_name: ${ZOOKEEPER_CONTAINER_NAME}
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: ${ZOOKEEPER_PORT}
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "${ZOOKEEPER_PORT}:${ZOOKEEPER_PORT}"
    networks:
      - local-network

  kafka:
    container_name: ${KAFKA_CONTAINER_NAME}
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "${KAFKA_PORT}:${KAFKA_PORT}"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:${ZOOKEEPER_PORT}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:${KAFKA_PORT}
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:${KAFKA_PORT}
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_MESSAGE_MAX_BYTES: 2097152
      KAFKA_REPLICA_FETCH_MAX_BYTES: 2097152
      KAFKA_FETCH_MAX_BYTES: 2097152
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:${KAFKA_PORT}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - local-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:${ZOOKEEPER_PORT}
    ports:
      - "${KAFKA_UI_PORT}:${KAFKA_UI_PORT}"
    networks:
      - local-network
    depends_on:
      - zookeeper
      - kafka

  redis:
    container_name: redis_fraud_engine
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT}:6379"
    networks:
      - local-network

  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    networks:
      - local-network

  ms-fraud-signals:
    build:
      context: ./ms-fraud-signals
      dockerfile: Dockerfile
    ports:
      - "${FRAUD_SCORE_APP_PORT}:8000"
    environment:
      KAFKA_BROKER_ADDRESS: kafka:29092
      KAFKA_CONSUMER_GROUP: fraud-score-group
      KAFKA_FRAUD_SIGNALS_REQUEST_TOPIC: FraudSignals.Request
      KAFKA_FRAUD_SIGNALS_CALCULATED_TOPIC: FraudSignals.Calculated
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DYNAMO_DB_ENDPOINT: http://dynamodb:${DYNAMO_DB_PORT}
      DYNAMO_DB_FRAUD_SCORES_TABLE: ddb-fraud-scores
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: dummy
      AWS_SECRET_ACCESS_KEY: dummy
      SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
      REQUESTS_CA_BUNDLE: /etc/ssl/certs/ca-certificates.crt
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_started
      dynamodb:
        condition: service_started
      qdrant:
        condition: service_started
    networks:
      - local-network

  ms-transaction-evaluator:
    container_name: ms_transaction_evaluator
    build:
      context: ./ms-transaction-evaluator
      dockerfile: Dockerfile
    ports:
      - "${EVALUATOR_APP_PORT}:${EVALUATOR_APP_PORT}"
    environment:
      EVALUATOR_APP_PORT: ${EVALUATOR_APP_PORT}
      DYNAMO_DB_TRANSACTIONS_TABLE: ${DYNAMO_DB_TRANSACTIONS_TABLE}
      DYNAMO_DB_ENDPOINT: http://dynamodb:${DYNAMO_DB_PORT}
      KAFKA_BROKER_ADDRESS: kafka:29092
      KAFKA_TRANSACTION_CREATED_TOPIC: Transaction.Created
      KAFKA_DECISION_CALCULATED_TOPIC: Decision.Calculated
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: dummy
      AWS_SECRET_ACCESS_KEY: dummy
      SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    depends_on:
      kafka:
        condition: service_healthy
      dynamodb:
        condition: service_started
      otel-collector:
        condition: service_started
    networks:
      - local-network

  ms-decision-service:
    build:
      context: ./ms-decision-service
      dockerfile: Dockerfile
    ports:
      - "${DECISION_APP_PORT}:${DECISION_APP_PORT}"
    environment:
      DECISION_APP_PORT: ${DECISION_APP_PORT}
      KAFKA_BROKER_ADDRESS: kafka:29092
      KAFKA_CONSUMER_GROUP: decision-service-group
      KAFKA_TRANSACTION_CREATED_TOPIC: Transaction.Created
      KAFKA_DECISION_CALCULATED_TOPIC: Decision.Calculated
      KAFKA_FRAUD_SIGNALS_REQUEST_TOPIC: FraudSignals.Request
      KAFKA_FRAUD_SIGNALS_CALCULATED_TOPIC: FraudSignals.Calculated
      DYNAMO_DB_RULES_TABLE: ${DYNAMO_DB_RULES_TABLE}
      DYNAMO_DB_RULE_EVALUATIONS_TABLE: ${DYNAMO_DB_RULE_EVALUATIONS_TABLE}
      DYNAMO_DB_ENDPOINT: http://dynamodb:${DYNAMO_DB_PORT}
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: dummy
      AWS_SECRET_ACCESS_KEY: dummy
      SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    depends_on:
      kafka:
        condition: service_healthy
      dynamodb:
        condition: service_started
      otel-collector:
        condition: service_started
    networks:
      - local-network

  dashboard:
    container_name: fraud_analyst_dashboard
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    networks:
      - local-network

  loki:
    image: grafana/loki:3.5.0
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki/loki-config.yml:/etc/loki/local-config.yaml
    networks:
      - local-network

  tempo:
    image: grafana/tempo:2.7.2
    ports:
      - "3200:3200"
    volumes:
      - ./observability/tempo/tempo-config.yml:/etc/tempo/tempo.yaml
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    networks:
      - local-network

  promtail:
    image: grafana/promtail:3.5.0
    volumes:
      - ./observability/promtail/promtail-config.yml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: ["-config.file=/etc/promtail/config.yml"]
    depends_on:
      - loki
    networks:
      - local-network

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.127.0
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./observability/otel-collector/otel-collector-config.yml:/etc/otelcol-contrib/config.yaml
    depends_on:
      - tempo
    networks:
      - local-network

  prometheus:
    image: prom/prometheus:v3.4.1
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-remote-write-receiver"
    networks:
      - local-network

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.9.0
    ports:
      - "9308:9308"
    command: ["--kafka.server=kafka:29092"]
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - local-network

  grafana:
    image: grafana/grafana:11.6.0
    ports:
      - "${GRAFANA_PORT:-3003}:3000"
    volumes:
      - ./observability/grafana/grafana.ini:/etc/grafana/grafana.ini
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - loki
      - tempo
      - prometheus
    networks:
      - local-network

networks:
  local-network:
    driver: bridge

volumes:
  dynamodb-data: